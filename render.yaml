services:
  - type: web
    name: gps-survey-accuracy
    runtime: static
    buildCommand: bash render-build.sh
    staticPublishPath: ./dist
    branch: main
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /*.css
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.js
        name: Cache-Control
        value: public, max-age=86400
    envVars:
      - key: KAKAO_MAP_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: GOOGLE_SHEETS_WEB_APP_URL
        sync: false
      - key: SURVEY_SESSION_CODE
        value: default
