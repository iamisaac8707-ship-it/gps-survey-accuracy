<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS 측량 오차 분석</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>

    <script>
      // 카카오맵 API 키 입력 위치:
      // 아래 빈 문자열에 카카오 개발자센터에서 발급받은 JavaScript 키를 넣으면 실제 지도가 로드됩니다.
      window.KAKAO_MAP_API_KEY = "";

      // Supabase 입력 위치:
      // Render 환경변수 SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY가 빌드 시 자동 주입됩니다.
      // service_role/secret key는 절대 브라우저 앱에 넣지 마세요.
      window.SUPABASE_URL = "";
      window.SUPABASE_PUBLISHABLE_KEY = "";
      window.SURVEY_SESSION_CODE = "default";

      // Google Sheets 입력 위치:
      // Google Apps Script 웹앱 URL을 넣으면 측정값이 Google Sheets에도 저장됩니다.
      window.GOOGLE_SHEETS_WEB_APP_URL = "";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="app-label">측량 수업 실험 도구</p>
          <h1>GPS 측량 오차 분석</h1>
        </div>
        <div class="header-actions">
          <div class="header-status">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="locationStatus">현재 위치 확인 중</span>
          </div>
          <div id="syncStatus" class="header-status sync-status">
            <span class="status-dot sync-dot" aria-hidden="true"></span>
            <span>로컬 저장소</span>
          </div>
        </div>
      </header>

      <main>
        <section class="workspace-grid" aria-label="측량 측정 작업 영역">
          <div class="panel map-panel">
            <div class="panel-heading map-heading">
              <div>
                <span class="section-kicker">지도</span>
                <h2>시작점과 측정점</h2>
              </div>
              <div id="mapStatus" class="map-status">지도 준비 중</div>
            </div>
            <div class="map-frame">
              <div id="map" class="map-canvas" role="application" aria-label="측정 지도"></div>
              <div id="gpsAccuracy" class="accuracy-badge">현재 GPS 정확도: 확인 중</div>
            </div>
            <div class="map-readout" aria-live="polite">
              <div>
                <span id="startLocationLabel">현재 좌표</span>
                <strong id="currentLocationText">-</strong>
              </div>
              <div>
                <span>측정점 좌표</span>
                <strong id="endLocationText">-</strong>
              </div>
              <div>
                <span>직선거리</span>
                <strong id="gpsDistanceText">-</strong>
              </div>
            </div>
          </div>

          <aside class="panel control-panel" aria-label="측정 입력 패널">
            <div class="panel-heading">
              <div>
                <span class="section-kicker">입력</span>
                <h2>측정 입력</h2>
              </div>
            </div>

            <button id="refreshLocationBtn" class="button button-secondary" type="button">
              <i data-lucide="refresh-cw" aria-hidden="true"></i>
              <span>현재 위치 새로고침</span>
            </button>

            <div class="mode-section">
              <span class="field-label">측정 방식</span>
              <div id="measurementModeGroup" class="segmented-control" role="group" aria-label="측정 방식">
                <button type="button" data-mode="gps" class="is-active">
                  <i data-lucide="locate-fixed" aria-hidden="true"></i>
                  <span>현재 위치 기준</span>
                </button>
                <button type="button" data-mode="manual">
                  <i data-lucide="map-pinned" aria-hidden="true"></i>
                  <span>두 지점 선택</span>
                </button>
              </div>

              <div id="pointPicker" class="point-picker is-hidden">
                <span class="field-label">지도 클릭 대상</span>
                <div id="pointTargetGroup" class="segmented-control" role="group" aria-label="지도 클릭 대상">
                  <button type="button" data-point="start" class="is-active">
                    <i data-lucide="flag" aria-hidden="true"></i>
                    <span>시작점</span>
                  </button>
                  <button type="button" data-point="end">
                    <i data-lucide="map-pin" aria-hidden="true"></i>
                    <span>측정점</span>
                  </button>
                </div>
              </div>
              <p id="modeHelpText" class="mode-help">지도를 클릭하면 현재 위치에서 측정점까지의 거리를 계산합니다.</p>
            </div>

            <div class="metric-stack">
              <div class="metric">
                <span>GPS 거리</span>
                <strong id="distanceMetric">-</strong>
              </div>
              <div class="metric metric-muted">
                <span>저장된 측정</span>
                <strong id="countMetric">0건</strong>
              </div>
            </div>

            <form id="measurementForm" class="measurement-form">
              <label class="field">
                <span>실제 측량값 (m)</span>
                <input
                  id="actualDistanceInput"
                  type="number"
                  min="0.01"
                  step="0.01"
                  inputmode="decimal"
                  placeholder="예: 35.42"
                />
              </label>

              <label class="field">
                <span>주변 환경</span>
                <select id="environmentSelect"></select>
              </label>

              <div class="button-row">
                <button id="saveMeasurementBtn" class="button button-primary" type="submit">
                  <i data-lucide="save" aria-hidden="true"></i>
                  <span>측정 데이터 저장</span>
                </button>
                <button id="downloadCsvBtn" class="button button-secondary" type="button">
                  <i data-lucide="download" aria-hidden="true"></i>
                  <span>CSV 파일 다운로드</span>
                </button>
              </div>
            </form>

            <div class="summary-strip">
              <div>
                <span>평균 상대 오차</span>
                <strong id="avgRelativeMetric">-</strong>
              </div>
              <div>
                <span>최대 절대 오차</span>
                <strong id="maxAbsoluteMetric">-</strong>
              </div>
            </div>
          </aside>
        </section>

        <section class="panel table-panel" aria-label="저장된 측정 데이터">
          <div class="panel-heading table-heading">
            <div>
              <span class="section-kicker">데이터</span>
              <h2>측정 데이터 리스트</h2>
            </div>
            <span id="sortStatus" class="sort-status">최신순 정렬</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th><button type="button" class="sort-button" data-sort="timestamp">일시</button></th>
                  <th><button type="button" class="sort-button" data-sort="environment">환경</button></th>
                  <th><button type="button" class="sort-button" data-sort="gpsDistance">GPS 거리(m)</button></th>
                  <th><button type="button" class="sort-button" data-sort="actualDistance">실측값(m)</button></th>
                  <th><button type="button" class="sort-button" data-sort="absoluteError">절대 오차(m)</button></th>
                  <th><button type="button" class="sort-button" data-sort="relativeError">상대 오차(%)</button></th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="measurementTableBody">
                <tr>
                  <td colspan="7" class="empty-cell">저장된 측정 데이터가 없습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="analytics-grid" aria-label="오차 분석 차트">
          <div class="panel chart-panel">
            <div class="panel-heading">
              <div>
                <span class="section-kicker">차트 1</span>
                <h2>오차율 분포</h2>
              </div>
            </div>
            <div class="chart-box">
              <canvas id="relativeErrorChart" aria-label="측정 횟수별 상대 오차율 차트"></canvas>
            </div>
          </div>

          <div class="panel chart-panel">
            <div class="panel-heading">
              <div>
                <span class="section-kicker">차트 2</span>
                <h2>환경별 평균 오차</h2>
              </div>
            </div>
            <div class="chart-box">
              <canvas id="environmentErrorChart" aria-label="환경별 평균 절대 오차 차트"></canvas>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./model.js" defer></script>
    <script src="./view.js" defer></script>
    <script src="./controller.js" defer></script>
  </body>
</html>
